<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — BDE CREAD Lyon</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --violet: #463A90;
      --orange: #E85100;
      --gradient: linear-gradient(135deg, #463A90, #7B3FA0, #E85100);
      --noir: #0f0f10;
      --gris-bg: #f5f5f7;
      --gris-border: #e0e0e5;
      --gris-texte: #6b6b7b;
      --radius: 14px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--gris-bg);
      color: var(--noir);
      min-height: 100vh;
    }

    /* ---- HEADER ---- */
    header {
      background: var(--noir);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .header-logo img { width: 36px; height: 36px; border-radius: 50%; }
    .header-logo span {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: white;
      letter-spacing: 1px;
    }
    #btn-logout {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.6);
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    #btn-logout:hover { background: rgba(255,255,255,0.14); color: white; }

    /* ---- LOGIN ---- */
    #screen-login {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 60px);
      padding: 2rem;
    }
    .login-card {
      background: white;
      border-radius: 20px;
      padding: 2.5rem;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 4px 40px rgba(70,58,144,0.10);
    }
    .login-card h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .login-card p {
      font-size: 14px;
      color: var(--gris-texte);
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }
    .login-card input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--gris-border);
      border-radius: 10px;
      font-size: 14px;
      font-family: monospace;
      margin-bottom: 1rem;
      transition: border-color 0.2s;
    }
    .login-card input:focus { outline: none; border-color: var(--violet); }
    .btn-primary {
      width: 100%;
      padding: 13px;
      background: var(--gradient);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.9; }

    /* ---- APP ---- */
    #screen-app { display: none; padding: 2rem; max-width: 860px; margin: 0 auto; }

    /* ---- TABS ---- */
    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
      background: white;
      padding: 6px;
      border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .tab {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      color: var(--gris-texte);
      transition: all 0.2s;
    }
    .tab.active {
      background: var(--gradient);
      color: white;
    }

    /* ---- PANELS ---- */
    .panel { display: none; }
    .panel.active { display: block; }

    /* ---- LISTE ITEMS ---- */
    .items-list { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.5rem; }

    .item-card {
      background: white;
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      gap: 1rem;
    }
    .item-card-info { flex: 1; }
    .item-card-title { font-weight: 600; font-size: 15px; }
    .item-card-sub { font-size: 13px; color: var(--gris-texte); margin-top: 2px; }
    .item-card-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }
    .btn-edit, .btn-delete {
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }
    .btn-edit { background: rgba(70,58,144,0.08); color: var(--violet); }
    .btn-edit:hover { background: rgba(70,58,144,0.15); }
    .btn-delete { background: rgba(220,50,50,0.08); color: #c0392b; }
    .btn-delete:hover { background: rgba(220,50,50,0.15); }

    /* ---- FORMULAIRE ---- */
    .form-card {
      background: white;
      border-radius: var(--radius);
      padding: 1.75rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      margin-bottom: 1rem;
    }
    .form-card h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 1.25rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--gris-border);
    }
    .form-row { margin-bottom: 1rem; }
    .form-row label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--gris-texte);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-row input, .form-row textarea, .form-row select {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--gris-border);
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s;
      background: white;
    }
    .form-row input:focus, .form-row textarea:focus, .form-row select:focus {
      outline: none;
      border-color: var(--violet);
    }
    .form-row textarea { resize: vertical; min-height: 80px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-actions { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1.25rem; }
    .btn-cancel {
      padding: 10px 20px;
      border-radius: 10px;
      border: 1.5px solid var(--gris-border);
      background: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      color: var(--gris-texte);
    }
    .btn-save {
      padding: 10px 24px;
      border-radius: 10px;
      border: none;
      background: var(--gradient);
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-add {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 11px 20px;
      background: white;
      border: 2px dashed var(--gris-border);
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      color: var(--violet);
      cursor: pointer;
      width: 100%;
      justify-content: center;
      transition: all 0.2s;
    }
    .btn-add:hover { border-color: var(--violet); background: rgba(70,58,144,0.04); }

    /* ---- TOAST ---- */
    #toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      color: white;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      pointer-events: none;
      z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { background: #1a9e5c; }
    #toast.error { background: #c0392b; }

    .empty-state {
      text-align: center;
      padding: 2.5rem;
      color: var(--gris-texte);
      font-size: 14px;
      background: white;
      border-radius: var(--radius);
    }

    /* ---- AUTOCOMPLETE ADRESSE ---- */
    .autocomplete-wrap { position: relative; }
    .autocomplete-list {
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: white;
      border: 1.5px solid var(--violet);
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      z-index: 100;
      max-height: 220px;
      overflow-y: auto;
    }
    .autocomplete-item {
      padding: 10px 14px;
      font-size: 13px;
      cursor: pointer;
      border-bottom: 1px solid var(--gris-border);
      line-height: 1.4;
    }
    .autocomplete-item:last-child { border-bottom: none; }
    .autocomplete-item:hover { background: rgba(70,58,144,0.06); }
    .autocomplete-item strong { color: var(--violet); font-size: 14px; }

    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      #screen-app { padding: 1rem; }
      .tabs { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-logo">
    <img src="assets/Logo.png" alt="BDE CREAD">
    <span>ADMIN — BDE CREAD</span>
  </div>
  <button id="btn-logout" onclick="logout()">Se déconnecter</button>
</header>

<!-- ÉCRAN LOGIN -->
<div id="screen-login">
  <div class="login-card">
    <h1>Connexion admin</h1>
    <p>Entre le token GitHub du compte BDEcreadien pour accéder au tableau de bord. Il sera mémorisé dans le navigateur.</p>
    <input type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" />
    <button class="btn-primary" onclick="login()">Se connecter</button>
  </div>
</div>

<!-- ÉCRAN APP -->
<div id="screen-app">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('evenements')">Événements</button>
    <button class="tab" onclick="switchTab('annonces')">Annonces</button>
    <button class="tab" onclick="switchTab('videos')">Vidéos</button>
  </div>

  <!-- PANEL ÉVÉNEMENTS -->
  <div class="panel active" id="panel-evenements">
    <div class="items-list" id="list-evenements"></div>
    <div id="form-evenement-wrap" style="display:none;">
      <div class="form-card">
        <h3 id="form-ev-title">Nouvel événement</h3>
        <div class="form-row">
          <label>Titre *</label>
          <input type="text" id="ev-titre" placeholder="Ex: Soirée de rentrée">
        </div>
        <div class="form-grid">
          <div class="form-row">
            <label>Date *</label>
            <input type="date" id="ev-date">
          </div>
          <div class="form-row">
            <label>Date affichée *</label>
            <input type="text" id="ev-dateAffichage" placeholder="Ex: Vendredi 4 juillet 2026">
          </div>
        </div>
        <div class="form-grid">
          <div class="form-row">
            <label>Horaire *</label>
            <input type="text" id="ev-horaire" placeholder="Ex: 23h30 – 04h00">
          </div>
          <div class="form-row">
            <label>Prix *</label>
            <input type="text" id="ev-prix" placeholder="Ex: 10€ ou Gratuit">
          </div>
        </div>
        <div class="form-row">
          <label>Lieu *</label>
          <div class="autocomplete-wrap">
            <input type="text" id="ev-lieu" placeholder="Tape le nom du lieu ou l'adresse…" autocomplete="off">
            <div class="autocomplete-list" id="lieu-suggestions" style="display:none;"></div>
          </div>
        </div>
        <div class="form-row">
          <label>Adresse complète</label>
          <input type="text" id="ev-adresse" placeholder="Remplie automatiquement" readonly style="background:#f5f5f7; color:var(--gris-texte);">
        </div>
        <div class="form-row">
          <label>Description *</label>
          <textarea id="ev-description" placeholder="Décris l'événement..."></textarea>
        </div>
        <div class="form-grid">
          <div class="form-row">
            <label>Lien billetterie (optionnel)</label>
            <input type="url" id="ev-lien" placeholder="https://shotgun.live/...">
          </div>
          <div class="form-row">
            <label>Type de lien</label>
            <select id="ev-typeLien">
              <option value="">Aucun</option>
              <option value="shotgun">Shotgun</option>
              <option value="helloasso">HelloAsso</option>
            </select>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn-cancel" onclick="cancelForm('evenement')">Annuler</button>
          <button class="btn-save" onclick="saveEvenement()">Publier</button>
        </div>
      </div>
    </div>
    <button class="btn-add" id="btn-add-ev" onclick="showForm('evenement')">+ Ajouter un événement</button>
  </div>

  <!-- PANEL ANNONCES -->
  <div class="panel" id="panel-annonces">
    <div class="items-list" id="list-annonces"></div>
    <div id="form-annonce-wrap" style="display:none;">
      <div class="form-card">
        <h3 id="form-an-title">Nouvelle annonce</h3>
        <div class="form-row">
          <label>Titre *</label>
          <input type="text" id="an-titre" placeholder="Ex: Table à dessin A1">
        </div>
        <div class="form-grid">
          <div class="form-row">
            <label>Catégorie *</label>
            <select id="an-categorie">
              <option value="materiel">Matériel</option>
              <option value="place">Places</option>
              <option value="logement">Logement</option>
              <option value="autre">Autre</option>
            </select>
          </div>
          <div class="form-row">
            <label>Prix *</label>
            <input type="text" id="an-prix" placeholder="Ex: 80 € ou Gratuit">
          </div>
        </div>
        <div class="form-row">
          <label>Description *</label>
          <textarea id="an-description" placeholder="Décris ce que tu vends ou proposes..."></textarea>
        </div>
        <div class="form-grid">
          <div class="form-row">
            <label>Ton prénom + initiale *</label>
            <input type="text" id="an-auteur" placeholder="Ex: Léa M.">
          </div>
          <div class="form-row">
            <label>Ton email de contact *</label>
            <input type="email" id="an-contact" placeholder="prenom@cread.fr">
          </div>
        </div>
        <div class="form-actions">
          <button class="btn-cancel" onclick="cancelForm('annonce')">Annuler</button>
          <button class="btn-save" onclick="saveAnnonce()">Publier</button>
        </div>
      </div>
    </div>
    <button class="btn-add" id="btn-add-an" onclick="showForm('annonce')">+ Ajouter une annonce</button>
  </div>

  <!-- PANEL VIDÉOS -->
  <div class="panel" id="panel-videos">
    <div class="items-list" id="list-videos"></div>
    <div id="form-video-wrap" style="display:none;">
      <div class="form-card">
        <h3 id="form-vi-title">Nouvelle vidéo</h3>
        <div class="form-row">
          <label>URL YouTube ou Vimeo *</label>
          <input type="url" id="vi-url" placeholder="https://www.youtube.com/watch?v=...">
        </div>
        <div class="form-row">
          <label>Titre (optionnel)</label>
          <input type="text" id="vi-titre" placeholder="Ex: Soirée de rentrée 2025">
        </div>
        <div class="form-actions">
          <button class="btn-cancel" onclick="cancelForm('video')">Annuler</button>
          <button class="btn-save" onclick="saveVideo()">Ajouter</button>
        </div>
      </div>
    </div>
    <button class="btn-add" id="btn-add-vi" onclick="showForm('video')">+ Ajouter une vidéo</button>
  </div>
</div>

<div id="toast"></div>

<script>
const REPO = 'BDEcreadien/bdecreadien';
const BRANCH = 'main';

let token = '';
let editIndex = { evenement: -1, annonce: -1, video: -1 };
let data = { evenements: [], annonces: [], videos: [] };

// ---- AUTH ----
function login() {
  const t = document.getElementById('token-input').value.trim();
  if (!t) return showToast('Entre un token', 'error');
  localStorage.setItem('bde_admin_token', t);
  token = t;
  init();
}

function logout() {
  localStorage.removeItem('bde_admin_token');
  document.getElementById('screen-login').style.display = 'flex';
  document.getElementById('screen-app').style.display = 'none';
  document.getElementById('btn-logout').style.display = 'none';
}

// ---- INIT ----
async function init() {
  document.getElementById('screen-login').style.display = 'none';
  document.getElementById('screen-app').style.display = 'block';
  document.getElementById('btn-logout').style.display = 'block';
  await Promise.all([
    loadData('evenements'),
    loadData('annonces'),
    loadData('videos'),
  ]);
}

// ---- GITHUB API ----
async function getFile(path) {
  const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}?ref=${BRANCH}&t=${Date.now()}`, {
    headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json', 'Cache-Control': 'no-cache' }
  });
  if (!res.ok) throw new Error('Fichier introuvable');
  return res.json();
}

async function saveFile(path, content, sha, message) {
  const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
    method: 'PUT',
    headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ message, content: btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2)))), sha, branch: BRANCH })
  });
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    throw new Error(`${res.status} — ${body.message || 'Erreur inconnue'}`);
  }
}

async function loadData(type) {
  try {
    const file = await getFile(`_data/${type}.json`);
    const raw = JSON.parse(atob(file.content.replace(/\n/g, '')));
    data[type] = Array.isArray(raw) ? raw : (raw[type] || []);
    renderList(type);
  } catch(e) {
    data[type] = [];
    renderList(type);
  }
}

async function persistData(type, message) {
  const file = await getFile(`_data/${type}.json`);
  await saveFile(`_data/${type}.json`, data[type], file.sha, message);
}

// ---- RENDU LISTES ----
function renderList(type) {
  const el = document.getElementById(`list-${type}`);
  if (!data[type].length) {
    el.innerHTML = `<div class="empty-state">Aucun élément pour l'instant.</div>`;
    return;
  }
  el.innerHTML = data[type].map((item, i) => {
    let title = '', sub = '';
    if (type === 'evenements') { title = item.titre; sub = `${item.dateAffichage} — ${item.lieu}`; }
    if (type === 'annonces') { title = item.titre; sub = `${item.prix} · ${item.auteur}`; }
    if (type === 'videos') { title = item.titre || item.url; sub = item.url; }
    return `
      <div class="item-card">
        <div class="item-card-info">
          <div class="item-card-title">${title}</div>
          <div class="item-card-sub">${sub}</div>
        </div>
        <div class="item-card-actions">
          <button class="btn-edit" onclick="editItem('${type}', ${i})">Modifier</button>
          <button class="btn-delete" onclick="deleteItem('${type}', ${i})">Supprimer</button>
        </div>
      </div>`;
  }).join('');
}

// ---- TABS ----
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab:nth-child(${['evenements','annonces','videos'].indexOf(name)+1})`).classList.add('active');
  document.getElementById(`panel-${name}`).classList.add('active');
}

// ---- FORMULAIRES ----
function showForm(type) {
  document.getElementById(`form-${type}-wrap`).style.display = 'block';
  document.getElementById(`btn-add-${type === 'evenement' ? 'ev' : type === 'annonce' ? 'an' : 'vi'}`).style.display = 'none';
}

function cancelForm(type) {
  document.getElementById(`form-${type}-wrap`).style.display = 'none';
  document.getElementById(`btn-add-${type === 'evenement' ? 'ev' : type === 'annonce' ? 'an' : 'vi'}`).style.display = 'flex';
  editIndex[type] = -1;
  clearForm(type);
}

function clearForm(type) {
  if (type === 'evenement') {
    ['ev-titre','ev-date','ev-dateAffichage','ev-horaire','ev-lieu','ev-adresse','ev-prix','ev-description','ev-lien'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('ev-typeLien').value = '';
    document.getElementById('lieu-suggestions').style.display = 'none';
    document.getElementById('form-ev-title').textContent = 'Nouvel événement';
  }
  if (type === 'annonce') {
    ['an-titre','an-prix','an-description','an-auteur','an-contact'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('an-categorie').value = 'materiel';
    document.getElementById('form-an-title').textContent = 'Nouvelle annonce';
  }
  if (type === 'video') {
    ['vi-url','vi-titre'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('form-vi-title').textContent = 'Nouvelle vidéo';
  }
}

function editItem(type, i) {
  editIndex[type === 'evenements' ? 'evenement' : type === 'annonces' ? 'annonce' : 'video'] = i;
  if (type === 'evenements') {
    const ev = data.evenements[i];
    document.getElementById('ev-titre').value = ev.titre || '';
    document.getElementById('ev-date').value = ev.date || '';
    document.getElementById('ev-dateAffichage').value = ev.dateAffichage || '';
    document.getElementById('ev-horaire').value = ev.horaire || '';
    document.getElementById('ev-lieu').value = ev.lieu || '';
    document.getElementById('ev-adresse').value = ev.adresse || '';
    document.getElementById('ev-prix').value = ev.prix || '';
    document.getElementById('ev-description').value = ev.description || '';
    document.getElementById('ev-lien').value = ev.lien || '';
    document.getElementById('ev-typeLien').value = ev.typeLien || '';
    document.getElementById('form-ev-title').textContent = 'Modifier l\'événement';
    showForm('evenement');
  }
  if (type === 'annonces') {
    const an = data.annonces[i];
    document.getElementById('an-titre').value = an.titre || '';
    document.getElementById('an-categorie').value = an.categorie || 'materiel';
    document.getElementById('an-prix').value = an.prix || '';
    document.getElementById('an-description').value = an.description || '';
    document.getElementById('an-auteur').value = an.auteur || '';
    document.getElementById('an-contact').value = an.contact || '';
    document.getElementById('form-an-title').textContent = 'Modifier l\'annonce';
    showForm('annonce');
  }
  if (type === 'videos') {
    const vi = data.videos[i];
    document.getElementById('vi-url').value = vi.url || '';
    document.getElementById('vi-titre').value = vi.titre || '';
    document.getElementById('form-vi-title').textContent = 'Modifier la vidéo';
    showForm('video');
  }
}

async function deleteItem(type, i) {
  if (!confirm('Supprimer cet élément ?')) return;
  data[type].splice(i, 1);
  try {
    await persistData(type, `Suppression dans ${type}`);
    renderList(type);
    showToast('Supprimé !', 'success');
  } catch(e) { showToast('Erreur : ' + e.message, 'error'); }
}

// ---- SAVE ÉVÉNEMENT ----
async function saveEvenement() {
  const titre = document.getElementById('ev-titre').value.trim();
  const date = document.getElementById('ev-date').value;
  const dateAffichage = document.getElementById('ev-dateAffichage').value.trim();
  const lieu = document.getElementById('ev-lieu').value.trim();
  const prix = document.getElementById('ev-prix').value.trim();
  const description = document.getElementById('ev-description').value.trim();
  if (!titre || !date || !dateAffichage || !lieu || !prix || !description) return showToast('Remplis tous les champs obligatoires', 'error');

  const horaire = document.getElementById('ev-horaire').value.trim();
  const adresse = document.getElementById('ev-adresse').value.trim();
  if (!horaire) return showToast('Remplis tous les champs obligatoires', 'error');

  const ev = { titre, date, dateAffichage, horaire, lieu, adresse, description, prix,
    lien: document.getElementById('ev-lien').value.trim(),
    typeLien: document.getElementById('ev-typeLien').value };

  const idx = editIndex.evenement;
  if (idx >= 0) { data.evenements[idx] = ev; }
  else { data.evenements.push(ev); }

  try {
    await persistData('evenements', idx >= 0 ? `Modification : ${titre}` : `Nouvel événement : ${titre}`);
    renderList('evenements');
    cancelForm('evenement');
    showToast('Événement publié !', 'success');
  } catch(e) { showToast('Erreur : ' + e.message, 'error'); }
}

// ---- TOAST ----
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `show ${type}`;
  setTimeout(() => t.className = '', 3000);
}

// ---- AUTOCOMPLETE LIEU (Nominatim) ----
let nominatimTimer = null;

function initLieuAutocomplete() {
  const input = document.getElementById('ev-lieu');
  const list = document.getElementById('lieu-suggestions');

  input.addEventListener('input', () => {
    clearTimeout(nominatimTimer);
    const q = input.value.trim();
    if (q.length < 3) { list.style.display = 'none'; return; }
    nominatimTimer = setTimeout(() => searchLieu(q), 350);
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.autocomplete-wrap')) list.style.display = 'none';
  });
}

async function searchLieu(q) {
  const list = document.getElementById('lieu-suggestions');
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&addressdetails=1&limit=5&countrycodes=fr`, {
      headers: { 'Accept-Language': 'fr' }
    });
    const results = await res.json();
    if (!results.length) { list.style.display = 'none'; return; }

    list.innerHTML = results.map((r, i) => {
      const nom = r.namedetails?.name || r.name || '';
      const adresse = r.display_name || '';
      return `<div class="autocomplete-item" onclick="selectLieu(${i})">
        <strong>${nom || adresse.split(',')[0]}</strong><br>
        <span style="color:var(--gris-texte); font-size:12px;">${adresse}</span>
      </div>`;
    }).join('');
    list._results = results;
    list.style.display = 'block';
  } catch(e) { list.style.display = 'none'; }
}

function selectLieu(i) {
  const list = document.getElementById('lieu-suggestions');
  const r = list._results[i];
  const nom = r.namedetails?.name || r.name || r.display_name.split(',')[0];
  document.getElementById('ev-lieu').value = nom;
  document.getElementById('ev-adresse').value = r.display_name;
  list.style.display = 'none';
}

// ---- BOOT ----
window.addEventListener('DOMContentLoaded', () => {
  token = localStorage.getItem('bde_admin_token') || '';
  document.getElementById('btn-logout').style.display = 'none';
  initLieuAutocomplete();
  if (token) init();
});
