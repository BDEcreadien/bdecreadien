<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scan fidélité — BDE CREAD</title>
  <link rel="icon" type="image/png" href="assets/Logo.png?v=2">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0a0812;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #0f0d1a;
      border-radius: 20px;
      padding: 32px 28px;
      max-width: 360px;
      width: 100%;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.07);
    }
    .logo { width: 48px; height: 48px; border-radius: 50%; margin: 0 auto 14px; display: block; }
    h1 { font-size: 20px; font-weight: 600; color: white; margin-bottom: 6px; }
    .sub { font-size: 14px; color: rgba(255,255,255,0.4); margin-bottom: 24px; line-height: 1.5; }
    .nom { font-size: 26px; font-weight: 600; color: white; margin-bottom: 4px; }
    .tampons { font-size: 14px; color: rgba(255,255,255,0.4); margin-bottom: 16px; }
    .progress { display: flex; gap: 5px; margin-bottom: 24px; }
    .bar { flex: 1; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.1); }
    .bar.active { background: linear-gradient(90deg, #463A90, #E85100); }
    .btn {
      width: 100%;
      padding: 15px;
      border-radius: 14px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg, #463A90, #7B3FA0, #E85100);
      color: white;
      margin-bottom: 10px;
      transition: opacity 0.2s;
    }
    .btn:active { opacity: 0.82; }
    .btn:disabled { opacity: 0.35; cursor: default; }
    .btn-secondary {
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.45);
      font-size: 14px;
      padding: 12px;
    }
    .btn-ghost {
      background: none;
      color: rgba(255,255,255,0.25);
      font-size: 12px;
      padding: 8px;
      border: none;
      cursor: pointer;
      width: 100%;
      margin-top: 4px;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1.5px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: white;
      font-size: 16px;
      margin-bottom: 12px;
      outline: none;
      font-family: inherit;
      text-align: center;
      letter-spacing: 3px;
    }
    input:focus { border-color: #463A90; }
    input.field-normal { text-align: left; letter-spacing: normal; }
    .badge { display: inline-block; padding: 4px 14px; border-radius: 99px; font-size: 13px; font-weight: 600; margin-bottom: 12px; }
    .badge-offert { background: linear-gradient(135deg, #463A90, #E85100); color: white; }
    .icon { font-size: 44px; margin-bottom: 10px; }
    #screen-login, #screen-carte, #screen-success, #screen-error, #screen-loading { display: none; }
  </style>
</head>
<body>
<div class="card">
  <img src="/assets/Logo.png" class="logo" alt="BDE CREAD">

  <!-- LOADING -->
  <div id="screen-loading">
    <div class="icon">⏳</div>
    <h1>Chargement…</h1>
  </div>

  <!-- LOGIN — code court uniquement -->
  <div id="screen-login">
    <h1>Code de scan</h1>
    <p class="sub">Entre le code BDE pour valider les passages. Il sera mémorisé 30 jours.</p>
    <input type="text" id="pin-input" placeholder="••••••" autocomplete="off"
      onkeydown="if(event.key==='Enter')doLogin()" autofocus>
    <button class="btn" onclick="doLogin()">Accéder</button>
    <p id="login-error" style="color:#e85100;font-size:13px;margin-top:-4px;display:none;">Code incorrect, réessaie.</p>
  </div>

  <!-- CARTE -->
  <div id="screen-carte">
    <p class="nom" id="sc-nom">—</p>
    <p class="tampons" id="sc-tampons">— / 10 tampons</p>
    <div class="progress" id="sc-progress"></div>
    <div id="sc-offert" style="display:none;margin-bottom:16px;">
      <span class="badge badge-offert">Carte complète — 1 accès offert</span>
    </div>
    <div style="margin-bottom:12px; display:flex; gap:8px;">
      <input type="text" id="sc-validateur" class="field-normal" placeholder="Ton prénom *" style="margin-bottom:0; flex:1;">
      <input type="text" id="sc-event" class="field-normal" placeholder="Événement *" style="margin-bottom:0; flex:1;">
    </div>
    <button class="btn" id="btn-tampon" onclick="ajouterTampon()">+ Valider ce passage</button>
    <button class="btn btn-secondary" onclick="history.back()">Annuler</button>
    <button class="btn-ghost" onclick="deconnecter()">Changer de code</button>
  </div>

  <!-- SUCCESS -->
  <div id="screen-success">
    <div class="icon">✅</div>
    <h1 id="sc-success-msg">Passage validé !</h1>
    <p class="sub" id="sc-success-sub"></p>
    <div class="progress" id="sc-progress-after" style="margin-bottom:20px;"></div>
    <div id="sc-offert-after" style="display:none;margin-bottom:20px;">
      <span class="badge badge-offert">Carte complète — 1 accès offert !</span>
    </div>
    <button class="btn" onclick="history.back()">Fermer</button>
  </div>

  <!-- ERROR -->
  <div id="screen-error">
    <div class="icon">❌</div>
    <h1>Erreur</h1>
    <p class="sub" id="sc-error-msg"></p>
    <button class="btn" onclick="location.reload()">Réessayer</button>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const carteId = params.get('id');

  // PIN stocké en cookie 30 jours + localStorage
  function savePin(p) {
    try { localStorage.setItem('bde_scan_pin', p); } catch(e) {}
    const exp = new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toUTCString();
    document.cookie = `bde_scan_pin=${encodeURIComponent(p)};expires=${exp};path=/;Secure;SameSite=Lax`;
  }
  function readPin() {
    try { const ls = localStorage.getItem('bde_scan_pin'); if (ls) return ls; } catch(e) {}
    const m = document.cookie.match(/(?:^|;\s*)bde_scan_pin=([^;]*)/);
    return m ? decodeURIComponent(m[1]) : '';
  }
  function clearPin() {
    try { localStorage.removeItem('bde_scan_pin'); } catch(e) {}
    document.cookie = 'bde_scan_pin=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=/;SameSite=Lax';
  }

  let pin = readPin();

  function show(screen) {
    ['login','carte','success','error','loading'].forEach(s => {
      document.getElementById('screen-' + s).style.display = s === screen ? 'block' : 'none';
    });
  }

  function deconnecter() {
    clearPin();
    pin = '';
    show('login');
    setTimeout(() => document.getElementById('pin-input').focus(), 50);
  }

  async function doLogin() {
    const p = document.getElementById('pin-input').value.trim();
    if (!p) return;
    // Vérification via l'API : si le code est bon, on charge la carte
    document.getElementById('login-error').style.display = 'none';
    show('loading');
    const res = await callApi(p);
    if (res === null) {
      // Erreur réseau
      show('login');
      document.getElementById('login-error').textContent = 'Erreur réseau, réessaie.';
      document.getElementById('login-error').style.display = 'block';
      return;
    }
    if (res.error === 'Code incorrect') {
      show('login');
      document.getElementById('login-error').style.display = 'block';
      return;
    }
    savePin(p);
    pin = p;
    handleApiResult(res);
  }

  async function callApi(pinToUse, validateur, event) {
    try {
      const body = { carteId, pin: pinToUse };
      if (validateur !== undefined) { body.validateur = validateur; body.event = event; }
      const res = await fetch('/api/tampon', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      return await res.json();
    } catch(e) { return null; }
  }

  async function loadCarte() {
    if (!carteId) { showError('ID de carte manquant.'); return; }
    if (!pin) { show('login'); return; }
    show('loading');
    const res = await callApi(pin);
    if (res === null) { showError('Erreur réseau.'); return; }
    if (res.error === 'Code incorrect') { clearPin(); pin = ''; show('login'); return; }
    handleApiResult(res);
  }

  function handleApiResult(res) {
    if (res.error && res.error !== 'Code incorrect') {
      // Erreur autre (carte introuvable, GitHub down…)
      showError(res.error);
      return;
    }
    if (res.carte) renderCarte(res.carte);
    else if (res.ok) showSuccess(res.carte);
    else show('login');
  }

  let carteData = null;

  function renderCarte(c) {
    carteData = c;
    const total = c.total || 10;
    document.getElementById('sc-nom').textContent = c.prenom + ' ' + c.nom;
    document.getElementById('sc-tampons').textContent = `${c.tampons} / ${total} tampons`;
    renderProgress('sc-progress', c.tampons, total);
    if (c.tampons >= total) {
      document.getElementById('sc-offert').style.display = 'block';
      document.getElementById('btn-tampon').disabled = true;
      document.getElementById('btn-tampon').textContent = 'Carte déjà complète';
    }
    show('carte');
    setTimeout(() => document.getElementById('sc-event').focus(), 100);
  }

  function renderProgress(id, tampons, total) {
    const el = document.getElementById(id);
    el.innerHTML = '';
    for (let i = 0; i < total; i++) {
      const bar = document.createElement('div');
      bar.className = 'bar' + (i < tampons ? ' active' : '');
      el.appendChild(bar);
    }
  }

  async function ajouterTampon() {
    const validateur = document.getElementById('sc-validateur').value.trim();
    const eventName = document.getElementById('sc-event').value.trim();
    let ok = true;
    if (!validateur) { document.getElementById('sc-validateur').style.borderColor = '#c0392b'; document.getElementById('sc-validateur').focus(); ok = false; }
    else document.getElementById('sc-validateur').style.borderColor = '';
    if (!eventName) { document.getElementById('sc-event').style.borderColor = '#c0392b'; if (ok) document.getElementById('sc-event').focus(); ok = false; }
    else document.getElementById('sc-event').style.borderColor = '';
    if (!ok) return;

    document.getElementById('btn-tampon').disabled = true;
    document.getElementById('btn-tampon').textContent = 'Validation…';

    const res = await callApi(pin, validateur, eventName);
    if (res === null || (res.error && res.error !== 'Carte déjà complète')) {
      document.getElementById('btn-tampon').disabled = false;
      document.getElementById('btn-tampon').textContent = '+ Valider ce passage';
      showError(res ? res.error : 'Erreur réseau.');
      return;
    }
    showSuccess(res.carte, eventName);
  }

  function showSuccess(c, eventName) {
    const carte = c || carteData;
    const total = (carte && carte.total) || 10;
    const tampons = (carte && carte.tampons) || 0;
    const complete = tampons >= total;
    document.getElementById('sc-success-msg').textContent = complete ? 'Carte complète !' : 'Passage validé !';
    document.getElementById('sc-success-sub').textContent = carte
      ? `${carte.prenom} ${carte.nom} — ${tampons}/${total} tampons${eventName ? ' · ' + eventName : ''}`
      : '';
    renderProgress('sc-progress-after', tampons, total);
    if (complete) document.getElementById('sc-offert-after').style.display = 'block';
    show('success');
  }

  function showError(msg) {
    document.getElementById('sc-error-msg').textContent = msg;
    show('error');
  }

  // L'API /api/tampon sans validateur/event = juste lire la carte (GET-like via POST)
  // On modifie la fonction pour séparer lecture et écriture
  loadCarte();
</script>
</body>
</html>
