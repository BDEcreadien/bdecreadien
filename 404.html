<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page introuvable — BDE CREAD Lyon</title>
  <link rel="stylesheet" href="css/style.css?v=3">
  <link rel="icon" type="image/png" href="assets/Logo.png?v=2">
  <style>
    .page-404 {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background: var(--noir);
      color: white;
    }
    .page-404-number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(100px, 20vw, 200px);
      line-height: 1;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }
    .page-404-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(22px, 4vw, 36px);
      font-weight: 700;
      margin-bottom: 1rem;
      letter-spacing: 0.02em;
    }
    .page-404-sub {
      font-size: 15px;
      color: rgba(255,255,255,0.5);
      max-width: 360px;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }
    .page-404-links {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .page-404-links a {
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .page-404-links a:hover { opacity: 0.8; }
    .page-404-links .btn-home {
      background: var(--gradient);
      color: white;
    }
    .page-404-links .btn-ghost {
      border: 1.5px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.7);
    }
  </style>
</head>
<body>
  <nav id="navbar" aria-label="Navigation principale">
    <a href="index.html" class="nav-logo" aria-label="BDE CREAD Lyon — Accueil">
      <img src="assets/Logo.png" alt="Logo BDE CREAD Lyon" width="44" height="44" style="border-radius:50%; object-fit:cover;">
      <div class="nav-logo-text">
        <span class="bde">BDE LYON</span>
        <span class="cread">CREAD</span>
      </div>
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Accueil</a></li>
      <li><a href="agenda.html">Agenda</a></li>
      <li><a href="communication.html">Communication</a></li>
      <li><a href="annonces.html">Annonces</a></li>
    </ul>
  </nav>

  <div class="page-404">
    <p class="page-404-number">404</p>
    <h1 class="page-404-title">Page introuvable</h1>
    <p class="page-404-sub">Cette page n'existe pas ou a été déplacée. Retourne sur le site du BDE CREAD.</p>
    <div class="page-404-links">
      <a href="index.html" class="btn-home">← Retour à l'accueil</a>
      <a href="agenda.html" class="btn-ghost">Voir l'agenda</a>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
