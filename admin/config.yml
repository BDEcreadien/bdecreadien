backend:
  name: github
  repo: BDEcreadien/bdecreadien
  branch: main
  base_url: https://sveltia-cms-auth.bdecreadien.workers.dev

site_url: https://bdecreadien.pages.dev
display_url: https://bdecreadien.pages.dev

media_folder: assets/uploads
public_folder: assets/uploads

locale: fr

collections:

  - name: "annonces"
    label: "Annonces"
    files:
      - name: "liste"
        label: "Liste des annonces"
        file: "_data/annonces.json"
        fields:
          - label: "Annonces"
            name: "annonces"
            widget: "list"
            summary: "{{fields.titre}} — {{fields.categorie}}"
            fields:
              - { label: "ID", name: "id", widget: "number" }
              - label: "Catégorie"
                name: "categorie"
                widget: "select"
                options:
                  - { label: "Matériel", value: "materiel" }
                  - { label: "Places", value: "place" }
                  - { label: "Logement", value: "logement" }
                  - { label: "Autre", value: "autre" }
              - { label: "Titre", name: "titre", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Prix", name: "prix", widget: "string" }
              - { label: "Auteur", name: "auteur", widget: "string" }
              - { label: "Date", name: "date", widget: "string" }
              - { label: "Contact (email)", name: "contact", widget: "string" }

  - name: "evenements"
    label: "Événements"
    files:
      - name: "liste"
        label: "Liste des événements"
        file: "_data/evenements.json"
        fields:
          - label: "Événements"
            name: "evenements"
            widget: "list"
            summary: "{{fields.titre}} — {{fields.dateAffichage}}"
            fields:
              - { label: "ID", name: "id", widget: "number" }
              - { label: "Titre", name: "titre", widget: "string" }
              - { label: "Date (AAAA-MM-JJ)", name: "date", widget: "string" }
              - { label: "Date affichée", name: "dateAffichage", widget: "string", hint: "Ex: Vendredi 4 juillet 2026" }
              - { label: "Lieu", name: "lieu", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Prix", name: "prix", widget: "string" }
              - { label: "Lien billetterie", name: "lien", widget: "string", required: false }
              - label: "Type de lien"
                name: "typeLien"
                widget: "select"
                required: false
                options:
                  - { label: "Aucun", value: "" }
                  - { label: "Shotgun", value: "shotgun" }
                  - { label: "HelloAsso", value: "helloasso" }

  - name: "videos"
    label: "Vidéos"
    files:
      - name: "liste"
        label: "Galerie vidéos"
        file: "_data/videos.json"
        fields:
          - label: "Vidéos"
            name: "videos"
            widget: "list"
            summary: "{{fields.titre}}"
            fields:
              - { label: "URL YouTube ou Vimeo", name: "url", widget: "string", hint: "Ex: https://www.youtube.com/watch?v=..." }
              - { label: "Titre (optionnel)", name: "titre", widget: "string", required: false }

  - name: "equipe"
    label: "Équipe"
    files:
      - name: "liste"
        label: "Membres de l'équipe"
        file: "_data/equipe.json"
        fields:
          - label: "Membres"
            name: "membres"
            widget: "list"
            summary: "{{fields.nom}} — {{fields.role}}"
            fields:
              - { label: "Nom complet", name: "nom", widget: "string" }
              - { label: "Rôle", name: "role", widget: "string" }
              - label: "Pôle"
                name: "pole"
                widget: "select"
                options:
                  - { label: "Bureau exécutif", value: "bureau" }
                  - { label: "Pôle Événements", value: "evenements" }
                  - { label: "Pôle Communication", value: "communication" }
              - { label: "Initiales", name: "initiales", widget: "string" }
              - { label: "Photo", name: "photo", widget: "image", required: false }
